{% extends "base.html" %}

{% block content %}

{% if messages %}
    {% for message in messages %}
        <p style="color:red;">{{ message }}</p>
    {% endfor %}
{% endif %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card shadow p-4" style="width: 100%; max-width: 400px; border-radius: 15px;">

        <h3 class="text-center mb-4">Вход</h3>

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Имя пользователя</label>
                <input type="text" name="username" class="form-control" placeholder="Введите логин">
            </div>

            <div class="mb-3">
                <label class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="Введите пароль">
            </div>

            <button type="submit" class="btn btn-dark w-100">Войти</button>
        </form>

        <p class="text-center mt-3">
            Нет аккаунта?
            <a href="/register/">Зарегистрироваться</a>
        </p>

    </div>
</div>

{% endblock %}
